<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Pro</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}

h1, h2 {
  text-align: center;
}

input {
  margin: 5px;
  padding: 8px;
}

button {
  padding: 6px;
  cursor: pointer;
}

#app {
  display: none;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

.bajo {
  background: #5a0000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Iniciar sesión</h2>
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <br>
  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">
  <h1>🚗 Inventario</h1>
  <button onclick="logout()">Cerrar sesión</button>

  <br><br>

  <input id="serie" placeholder="Número de serie">
  <input id="pieza" placeholder="Pieza">
  <input id="marca" placeholder="Marca">
  <input id="cantidad" type="number" placeholder="Cantidad">
  <input id="compra" type="number" placeholder="Precio compra">
  <input id="venta" type="number" placeholder="Precio venta">
  <button onclick="agregar()">Agregar</button>

  <br><br>

  <table>
    <thead>
      <tr>
        <th>Número de serie</th>
        <th>Pieza</th>
        <th>Marca</th>
        <th>Cantidad</th>
        <th>Compra</th>
        <th>Venta</th>
        <th>Ganancia</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDYSgns53l27_8yrSFmsFXjvXN77m_XExk",
  authDomain: "inventario-app-134fa.firebaseapp.com",
  projectId: "inventario-app-134fa",
  storageBucket: "inventario-app-134fa.firebasestorage.app",
  messagingSenderId: "414583075085",
  appId: "1:414583075085:web:c4a1d0efe61c9f8ce28044"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 🔐 AUTH
function registrar() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(() => alert("Usuario creado"))
    .catch(e => alert(e.message));
}

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .then(() => alert("Bienvenido"))
    .catch(e => alert(e.message));
}

function logout() {
  auth.signOut();
}

// 🔄 CONTROL DE SESIÓN
auth.onAuthStateChanged(user => {
  if (user) {
    loginDiv.style.display = "none";
    app.style.display = "block";
    cargarDatos();
  } else {
    loginDiv.style.display = "block";
    app.style.display = "none";
  }
});

// 📦 GUARDAR
function agregar() {
  let user = auth.currentUser;
  if (!user) return;

  db.collection("inventario").add({
    serie: serie.value,
    pieza: pieza.value,
    marca: marca.value,
    cantidad: Number(cantidad.value),
    compra: Number(compra.value),
    venta: Number(venta.value),
    uid: user.uid
  }).then(() => {
    limpiar();
    cargarDatos();
  });
}

// 📥 CARGAR
function cargarDatos() {
  let user = auth.currentUser;
  if (!user) return;

  tabla.innerHTML = "";

  db.collection("inventario")
    .where("uid", "==", user.uid)
    .get()
    .then(snapshot => {
      snapshot.forEach(doc => {
        let item = doc.data();

        tabla.innerHTML += `
          <tr>
            <td>${item.serie}</td>
            <td>${item.pieza}</td>
            <td>${item.marca}</td>
            <td>${item.cantidad}</td>
            <td>$${item.compra}</td>
            <td>$${item.venta}</td>
            <td>$${item.venta - item.compra}</td>
          </tr>
        `;
      });
    });
}

// 🧹 LIMPIAR
function limpiar() {
  serie.value = "";
  pieza.value = "";
  marca.value = "";
  cantidad.value = "";
  compra.value = "";
  venta.value = "";
}
</script>

</body>
</html>
