<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Pro</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}

h1, h2 {
  text-align: center;
}

input {
  margin: 5px;
  padding: 8px;
}

button {
  padding: 6px;
  cursor: pointer;
}

#app { display: none; }

.panel {
  background: #1b1b1b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #333;
}

.panel h3 {
  text-align: center;
  margin-top: 0;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

.bajo {
  background: #5a0000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginDiv">
  <h2>🔐 Acceso</h2>
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

<h1>📦 Inventario Pro</h1>
<button onclick="logout()">Cerrar sesión</button>

<!-- FILTROS -->
<div class="panel">
  <h3>🔎 Filtros</h3>
  <div class="row">
    <input id="buscarSerie" placeholder="Buscar serie">
    <input id="filtroMarca" placeholder="Marca">
    <input id="minStock" type="number" placeholder="Stock mínimo">
    <input id="maxStock" type="number" placeholder="Stock máximo">
  </div>
</div>

<!-- PRODUCTO -->
<div class="panel">
  <h3>➕ Nuevo producto</h3>
  <div class="row">
    <input id="serie" placeholder="Serie">
    <input id="pieza" placeholder="Pieza">
    <input id="marca" placeholder="Marca">
    <input id="cantidad" type="number" placeholder="Cantidad">
    <input id="compra" type="number" placeholder="Compra">
    <input id="venta" type="number" placeholder="Venta">
  </div>

  <div style="text-align:center; margin-top:10px;">
    <button onclick="agregar()">Agregar</button>
  </div>
</div>

<!-- TABLA -->
<table>
<thead>
<tr>
  <th>Serie</th>
  <th>Pieza</th>
  <th>Marca</th>
  <th>Cantidad</th>
  <th>Compra</th>
  <th>Venta</th>
  <th>Ganancia</th>
  <th>Movimiento</th>
  <th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* 🔧 CONFIG FIREBASE (PEGAR AQUÍ TU CONFIG REAL) */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAIL = "alebatsibat@gmail.com";
const STOCK_MINIMO = 5;

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  );
}

function logout(){
  auth.signOut();
}

/* ELEMENTOS */
const loginDiv = document.getElementById("loginDiv");
const app = document.getElementById("app");
const tabla = document.getElementById("tabla");

/* INPUTS */
const serie = document.getElementById("serie");
const pieza = document.getElementById("pieza");
const marca = document.getElementById("marca");
const cantidad = document.getElementById("cantidad");
const compra = document.getElementById("compra");
const venta = document.getElementById("venta");

const buscarSerie = document.getElementById("buscarSerie");
const filtroMarca = document.getElementById("filtroMarca");
const minStock = document.getElementById("minStock");
const maxStock = document.getElementById("maxStock");

/* AUTH */
auth.onAuthStateChanged(user => {
  if (user) {
    loginDiv.style.display = "none";
    app.style.display = "block";
    cargar();
  } else {
    loginDiv.style.display = "block";
    app.style.display = "none";
  }
});

/* AGREGAR PRODUCTO */
function agregar(){
  db.collection("inventario").add({
    serie: serie.value,
    pieza: pieza.value,
    marca: marca.value,
    cantidad: Number(cantidad.value),
    compra: Number(compra.value),
    venta: Number(venta.value),
    uid: auth.currentUser.uid
  });
}

/* CARGAR INVENTARIO */
function cargar(){
  db.collection("inventario")
  .onSnapshot(snapshot => {

    tabla.innerHTML = "";

    let s = buscarSerie.value.toLowerCase();
    let m = filtroMarca.value.toLowerCase();
    let min = Number(minStock.value);
    let max = Number(maxStock.value);

    snapshot.forEach(doc => {
      let d = doc.data();

      if (
        (s && !d.serie.toLowerCase().includes(s)) ||
        (m && !d.marca.toLowerCase().includes(m)) ||
        (minStock.value && d.cantidad < min) ||
        (maxStock.value && d.cantidad > max)
      ) return;

      let ganancia = d.venta - d.compra;

      tabla.innerHTML += `
      <tr class="${d.cantidad <= STOCK_MINIMO ? 'bajo' : ''}">
        <td>${d.serie}</td>
        <td>${d.pieza}</td>
        <td>${d.marca}</td>
        <td>${d.cantidad}</td>
        <td>${d.compra}</td>
        <td>${d.venta}</td>
        <td>${ganancia}</td>

        <td>
          <input id="m_${doc.id}" type="number" style="width:70px">
          <button onclick="sumar('${doc.id}')">+</button>
          <button onclick="restar('${doc.id}')">-</button>
        </td>

        <td>
          <button onclick="eliminar('${doc.id}')">❌</button>
        </td>
      </tr>
      `;
    });
  });
}

/* SUMAR */
function sumar(id){
  let val = Number(document.getElementById("m_"+id).value);

  db.collection("inventario").doc(id).get().then(doc=>{
    db.collection("inventario").doc(id).update({
      cantidad: doc.data().cantidad + val
    });
  });
}

/* RESTAR */
function restar(id){
  let val = Number(document.getElementById("m_"+id).value);

  db.collection("inventario").doc(id).get().then(doc=>{
    let actual = doc.data().cantidad;
    if(actual < val) return alert("No hay stock");

    db.collection("inventario").doc(id).update({
      cantidad: actual - val
    });
  });
}

/* ELIMINAR */
function eliminar(id){
  db.collection("inventario").doc(id).delete();
}
</script>

<!-- PWA SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("PWA lista"));
}
</script>

</body>
</html>
