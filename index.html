<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script><style>
body{
  font-family: Arial;
  background:#d6d6d6;
  color:#111;
  padding:20px;
}

h1,h2,h3{ text-align:center; }

input,textarea{
  font-family: inherit;
  font-size: 14px;
  width:180px;
  height:36px;
  margin:5px;
  padding:6px;
  box-sizing:border-box;
}

textarea{ resize:none; }

button{
  cursor:pointer;
  font-family: inherit;
  font-size: 14px;
  padding:6px 10px;
  margin:5px;
}

#app{ display:none; }

/* 🔵 AZUL MÁS OSCURO */
.panel{
  background:#1f3f7a;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #142a52;
  color:#fff;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#f2f2f2;
  color:#111;
}

th,td{
  border:1px solid #b5b5b5;
  padding:8px;
  text-align:center;
}

th{
  background:#c9c9c9;
}

.bajo{ background:#ffd6d6; }

.detail-row td{
  background:#cfcfcf;
  text-align:left;
}
</style></head><body><div id="login" class="panel">
  <h2>🔐 Acceso</h2>
  <input id="email" placeholder="Correo">
  <input id="pass" type="password" placeholder="Contraseña">
  <br>
  <button onclick="login()">Entrar</button>
</div><div id="app">  <h1>🚗 Inventario Refacciones</h1>
  <button onclick="logout()">Cerrar sesión</button>  <div class="panel">
    <h3>🔎 Filtros</h3>
    <div class="row">
      <input id="buscarSerie" placeholder="Serie">
      <input id="filtroMarca" placeholder="Marca">
      <input id="minStock" type="number" placeholder="Stock mínimo">
      <input id="maxStock" type="number" placeholder="Stock máximo">
    </div>
  </div>  <div class="panel">
    <h3>➕ Nuevo producto</h3>
    <div class="row">
      <input id="serie" placeholder="Serie">
      <input id="pieza" placeholder="Pieza">
      <input id="marca" placeholder="Marca">
      <input id="cantidad" type="number" placeholder="Cantidad">
      <input id="compra" type="number" placeholder="Compra">
      <input id="venta" type="number" placeholder="Venta">
    </div>
    <div class="row">
      <textarea id="utilidad" placeholder="Utilidad / descripción"></textarea>
      <textarea id="compatibilidad" placeholder="Compatible con autos"></textarea>
    </div>
    <div style="text-align:center">
      <button onclick="agregar()">Agregar</button>
    </div>
  </div>  <table>
    <thead>
      <tr>
        <th>Serie</th>
        <th>Pieza</th>
        <th>Marca</th>
        <th>Cantidad</th>
        <th>Compra</th>
        <th>Venta</th>
        <th>Ganancia</th>
        <th>Info</th>
        <th>Mov</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table></div><script>
const firebaseConfig = {
  apiKey: "AIzaSyDYSgns53l27_8yrSFmsFXjvXN77m_XExk",
  authDomain: "inventario-app-134fa.firebaseapp.com",
  projectId: "inventario-app-134fa",
  storageBucket: "inventario-app-134fa.firebasestorage.app",
  messagingSenderId: "414583075085",
  appId: "1:414583075085:web:c4a1d0efe61c9f8ce28044"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser=null;
let role="employee";
let unsubscribe=null;
let inventarioCache=[];
let openRow={};
const STOCK_MINIMO=5;

const $=id=>document.getElementById(id);

function login(){
  auth.signInWithEmailAndPassword($("email").value,$("pass").value)
  .catch(e=>alert(e.message));
}

function logout(){ auth.signOut(); }

async function loadRole(uid){
  const doc=await db.collection("users").doc(uid).get();
  role=doc.exists?doc.data().role:"employee";
}

auth.onAuthStateChanged(async user=>{
  currentUser=user;
  if(user){
    $("login").style.display="none";
    $("app").style.display="block";
    await loadRole(user.uid);
    cargarDatos();
  }else{
    $("login").style.display="block";
    $("app").style.display="none";
    if(unsubscribe)unsubscribe();
  }
});

function cargarDatos(){
  if(unsubscribe)unsubscribe();

  unsubscribe=db.collection("inventario")
  .where("uid","==",currentUser.uid)
  .onSnapshot(snap=>{
    inventarioCache=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderTabla();
  });
}

function toggleRow(id){
  openRow[id]=!openRow[id];
  renderTabla();
}

function renderTabla(){

  const serieF=$("buscarSerie").value.toLowerCase();
  const marcaF=$("filtroMarca").value.toLowerCase();
  const min=Number($("minStock").value);
  const max=Number($("maxStock").value);

  $("tabla").innerHTML="";

  inventarioCache.forEach(i=>{

    if(
      (serieF&&!i.serie.toLowerCase().includes(serieF))||
      (marcaF&&!i.marca.toLowerCase().includes(marcaF))||
      ($("minStock").value&&i.cantidad<min)||
      ($("maxStock").value&&i.cantidad>max)
    )return;

    const open=openRow[i.id];

    $("tabla").innerHTML+=`
      <tr class="${i.cantidad<=STOCK_MINIMO?'bajo':''}">
        <td>${i.serie}</td>
        <td>${i.pieza}</td>
        <td>${i.marca}</td>
        <td>${i.cantidad}</td>
        <td>$${i.compra}</td>
        <td>$${i.venta}</td>
        <td>$${i.venta-i.compra}</td>
        <td><button onclick="toggleRow('${i.id}')">${open?'Ocultar':'Ver info'}</button></td>
        <td>
          <input id="m_${i.id}" type="number" style="width:60px">
          <button onclick="mov('${i.id}',1)">➕</button>
          <button onclick="mov('${i.id}',-1)">➖</button>
        </td>
        <td>${role==='admin'?`<button onclick="del('${i.id}')">❌</button>`:'-'}</td>
      </tr>

      <tr class="detail-row" style="display:${open?'table-row':'none'}">
        <td colspan="10">
          <b>Utilidad:</b><br>${i.utilidad||''}<br><br>
          <b>Compatibilidad:</b><br>${i.compatibilidad||''}
        </td>
      </tr>
    `;
  });
}

function agregar(){
  db.collection("inventario").add({
    uid:currentUser.uid,
    serie:$("serie").value,
    pieza:$("pieza").value,
    marca:$("marca").value,
    cantidad:Number($("cantidad").value),
    compra:Number($("compra").value),
    venta:Number($("venta").value),
    utilidad:$("utilidad").value,
    compatibilidad:$("compatibilidad").value
  });
}

function mov(id,dir){
  const input=$("m_"+id);
  const val=Number(input.value)||1;
  const item=inventarioCache.find(x=>x.id===id);
  if(!item)return;

  db.collection("inventario").doc(id).update({
    cantidad:item.cantidad+(val*dir)
  });
  input.value="";
}

function del(id){
  if(role!=='admin')return;
  db.collection("inventario").doc(id).delete();
}

$("buscarSerie").addEventListener("input",renderTabla);
$("filtroMarca").addEventListener("input",renderTabla);
$("minStock").addEventListener("input",renderTabla);
$("maxStock").addEventListener("input",renderTabla);

</script></body>
</html>
