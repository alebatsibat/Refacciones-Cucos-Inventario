<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Pro</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}

h1, h2 {
  text-align: center;
}

input {
  margin: 5px;
  padding: 8px;
}

button {
  padding: 6px;
  cursor: pointer;
}

#app { display: none; }

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #444;
  padding: 8px;
  text-align: center;
}

.bajo {
  background: #5a0000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginDiv">
  <h2>🔐 Acceso</h2>
  <input id="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">
  <br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">
  <h1>🚗 Inventario</h1>
  <button onclick="logout()">Cerrar sesión</button>

  <br><br>

  <!-- FILTROS -->
  <input id="buscarSerie" placeholder="Buscar">
  <input id="filtroMarca" placeholder="Marca">
  <input id="minStock" type="number" placeholder="Stock mínimo">
  <input id="maxStock" type="number" placeholder="Stock máximo">

  <br><br>

  <!-- FORMULARIO -->
  <input id="serie" placeholder="Número de serie">
  <input id="pieza" placeholder="Pieza">
  <input id="marca" placeholder="Marca">
  <input id="cantidad" type="number" placeholder="Cantidad inicial">
  <input id="compra" type="number" placeholder="Precio compra">
  <input id="venta" type="number" placeholder="Precio venta">

  <button onclick="agregar()">Agregar</button>

  <table>
    <thead>
      <tr>
        <th>Serie</th>
        <th>Pieza</th>
        <th>Marca</th>
        <th>Cantidad</th>
        <th>Compra</th>
        <th>Venta</th>
        <th>Ganancia</th>
        <th>Movimiento</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const ADMIN_EMAIL = "tucorreo@gmail.com";
const STOCK_MINIMO = 5;

const firebaseConfig = {
  apiKey: "AIzaSyDYSgns53l27_8yrSFmsFXjvXN77m_XExk",
  authDomain: "inventario-app-134fa.firebaseapp.com",
  projectId: "inventario-app-134fa",
  storageBucket: "inventario-app-134fa.firebasestorage.app",
  messagingSenderId: "414583075085",
  appId: "1:414583075085:web:c4a1d0efe61c9f8ce28044"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ELEMENTOS */
const email = document.getElementById("email");
const password = document.getElementById("password");

const serie = document.getElementById("serie");
const pieza = document.getElementById("pieza");
const marca = document.getElementById("marca");
const cantidad = document.getElementById("cantidad");
const compra = document.getElementById("compra");
const venta = document.getElementById("venta");

const tabla = document.getElementById("tabla");
const loginDiv = document.getElementById("loginDiv");
const app = document.getElementById("app");

const buscarSerie = document.getElementById("buscarSerie");
const filtroMarca = document.getElementById("filtroMarca");
const minStock = document.getElementById("minStock");
const maxStock = document.getElementById("maxStock");

/* LOGIN */
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function logout() {
  auth.signOut();
}

/* SESIÓN */
auth.onAuthStateChanged(user => {
  if (user && user.email === ADMIN_EMAIL) {
    loginDiv.style.display = "none";
    app.style.display = "block";
    cargarDatos();
  } else {
    loginDiv.style.display = "block";
    app.style.display = "none";
  }
});

/* AGREGAR */
function agregar() {
  let user = auth.currentUser;
  if (!user) return;

  db.collection("inventario").add({
    serie: serie.value,
    pieza: pieza.value,
    marca: marca.value,
    cantidad: Number(cantidad.value),
    compra: Number(compra.value),
    venta: Number(venta.value),
    uid: user.uid
  });

  limpiar();
}

/* CARGAR */
function cargarDatos() {
  let user = auth.currentUser;
  if (!user) return;

  let alertasMostradas = new Set();

  db.collection("inventario")
    .where("uid", "==", user.uid)
    .onSnapshot(snapshot => {

      tabla.innerHTML = "";

      let serieFiltro = buscarSerie.value.toLowerCase();
      let marcaFiltro = filtroMarca.value.toLowerCase();
      let min = Number(minStock.value);
      let max = Number(maxStock.value);

      alertasMostradas.clear();

      snapshot.forEach(doc => {
        let item = doc.data();

        /* FILTROS */
        if (
          (serieFiltro && !item.serie.toLowerCase().includes(serieFiltro)) ||
          (marcaFiltro && !item.marca.toLowerCase().includes(marcaFiltro)) ||
          (minStock.value && item.cantidad < min) ||
          (maxStock.value && item.cantidad > max)
        ) return;

        /* ALERTA STOCK BAJO */
        if (item.cantidad <= STOCK_MINIMO && !alertasMostradas.has(item.serie)) {
          alert(`⚠️ Stock bajo: ${item.serie} (${item.cantidad})`);
          alertasMostradas.add(item.serie);
        }

        tabla.innerHTML += `
          <tr class="${item.cantidad < STOCK_MINIMO ? 'bajo' : ''}">
            <td>${item.serie}</td>
            <td>${item.pieza}</td>
            <td>${item.marca}</td>
            <td>${item.cantidad}</td>
            <td>$${item.compra}</td>
            <td>$${item.venta}</td>
            <td>$${Number(item.venta - item.compra)}</td>

            <td>
              <input id="mov_${doc.id}" type="number" placeholder="Cantidad" style="width:80px">
              <br>
              <button onclick="comprar('${doc.id}')">➕</button>
              <button onclick="vender('${doc.id}')">➖</button>
            </td>

            <td>
              <button onclick="eliminar('${doc.id}')">❌</button>
            </td>
          </tr>
        `;
      });
    });
}

/* ➕ COMPRAR */
function comprar(id) {
  let input = document.getElementById("mov_" + id);
  let cant = Number(input.value);

  if (!cant || cant <= 0) return alert("Cantidad inválida");

  let ref = db.collection("inventario").doc(id);

  ref.get().then(doc => {
    ref.update({
      cantidad: doc.data().cantidad + cant
    });
    input.value = "";
  });
}

/* ➖ VENDER */
function vender(id) {
  let input = document.getElementById("mov_" + id);
  let cant = Number(input.value);

  if (!cant || cant <= 0) return alert("Cantidad inválida");

  let ref = db.collection("inventario").doc(id);

  ref.get().then(doc => {
    let actual = doc.data().cantidad;

    if (actual < cant) return alert("No hay suficiente stock");

    ref.update({
      cantidad: actual - cant
    });

    input.value = "";
  });
}

/* ❌ ELIMINAR */
function eliminar(id) {
  db.collection("inventario").doc(id).delete();
}

/* LIMPIAR */
function limpiar() {
  serie.value = "";
  pieza.value = "";
  marca.value = "";
  cantidad.value = "";
  compra.value = "";
  venta.value = "";
}

/* FILTROS EN TIEMPO REAL */
buscarSerie.addEventListener("input", cargarDatos);
filtroMarca.addEventListener("input", cargarDatos);
minStock.addEventListener("input", cargarDatos);
maxStock.addEventListener("input", cargarDatos);
</script>

</body>
</html>
