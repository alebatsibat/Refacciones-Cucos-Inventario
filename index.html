<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario Pro</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- Firebase (compat v8 para estilo db.collection) --><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script><style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}
input,button{
  margin:5px;
  padding:8px;
}
table{
  width:100%;
  border-collapse: collapse;
}
td,th{
  border:1px solid #333;
  padding:6px;
}
.bajo{
  background:#5a1a1a;
}
</style></head>
<body><h2>Inventario Pro</h2><div id="login">
  <input id="email" placeholder="Correo">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div><div id="app" style="display:none;">  <input id="serie" placeholder="Serie">
  <input id="pieza" placeholder="Pieza">
  <input id="marca" placeholder="Marca">
  <input id="cantidad" type="number" placeholder="Cantidad">
  <input id="compra" type="number" placeholder="Compra">
  <input id="venta" type="number" placeholder="Venta">
  <button onclick="agregar()">Agregar</button>  <hr>  <input id="buscarSerie" placeholder="Buscar serie">
  <input id="filtroMarca" placeholder="Filtrar marca">
  <input id="minStock" type="number" placeholder="Min stock">
  <input id="maxStock" type="number" placeholder="Max stock">  <table>
    <thead>
      <tr>
        <th>Serie</th>
        <th>Pieza</th>
        <th>Marca</th>
        <th>Cantidad</th>
        <th>Compra</th>
        <th>Venta</th>
        <th>Ganancia</th>
        <th>Mov</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table></div><script>
// CONFIG FIREBASE (pon la tuya)
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH",
  projectId: "TU_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let unsubscribe = null;
let inventarioCache = [];
const STOCK_MINIMO = 5;

function $(id){ return document.getElementById(id); }

function login(){
  auth.signInWithEmailAndPassword($("email").value, $("pass").value)
  .then(u=>{
    currentUser = u.user;
    $("login").style.display = "none";
    $("app").style.display = "block";
    cargarDatos();
  })
  .catch(e=>alert(e.message));
}

function cargarDatos(){
  if(unsubscribe) unsubscribe();

  unsubscribe = db.collection("inventario")
    .where("uid","==",currentUser.uid)
    .onSnapshot(snapshot=>{

      inventarioCache = snapshot.docs.map(d=>({
        id:d.id,
        ...d.data()
      }));

      renderTabla();
    });
}

function renderTabla(){

  const serieF = $("buscarSerie").value.toLowerCase();
  const marcaF = $("filtroMarca").value.toLowerCase();
  const min = Number($("minStock").value);
  const max = Number($("maxStock").value);

  $("tabla").innerHTML = "";

  inventarioCache.forEach(i=>{

    if(
      (serieF && !i.serie.toLowerCase().includes(serieF)) ||
      (marcaF && !i.marca.toLowerCase().includes(marcaF)) ||
      ($("minStock").value && i.cantidad < min) ||
      ($("maxStock").value && i.cantidad > max)
    ) return;

    $("tabla").innerHTML += `
      <tr class="${i.cantidad <= STOCK_MINIMO ? 'bajo':''}">
        <td>${i.serie}</td>
        <td>${i.pieza}</td>
        <td>${i.marca}</td>
        <td>${i.cantidad}</td>
        <td>$${i.compra}</td>
        <td>$${i.venta}</td>
        <td>$${i.venta - i.compra}</td>
        <td>
          <input id="m_${i.id}" type="number" style="width:60px">
          <button onclick="mov('${i.id}',1)">➕</button>
          <button onclick="mov('${i.id}',-1)">➖</button>
        </td>
        <td><button onclick="del('${i.id}')">❌</button></td>
      </tr>
    `;
  });
}

function agregar(){
  db.collection("inventario").add({
    uid:currentUser.uid,
    serie:$("serie").value,
    pieza:$("pieza").value,
    marca:$("marca").value,
    cantidad:Number($("cantidad").value),
    compra:Number($("compra").value),
    venta:Number($("venta").value)
  });
}

function mov(id,dir){
  const input = document.getElementById("m_"+id);
  const val = Number(input.value)||1;

  const item = inventarioCache.find(x=>x.id===id);
  if(!item) return;

  db.collection("inventario").doc(id).update({
    cantidad: item.cantidad + (val*dir)
  });
}

function del(id){
  db.collection("inventario").doc(id).delete();
}

$("buscarSerie").addEventListener("input",renderTabla);
$("filtroMarca").addEventListener("input",renderTabla);
$("minStock").addEventListener("input",renderTabla);
$("maxStock").addEventListener("input",renderTabla);

</script></body>
</html>
